<nav class="site-nav">
  <div class="container">
    <a class="brand" href="{{ site.baseurl }}">{{ site.author.name }}</a>

    <ul>
      <li><a class="{% if page.url == '/' %}active{% endif %}" href="/">Home</a></li>

      {% assign pages_list = site.pages %}
      {% for node in pages_list %}
        {% if node.title != null and node.layout == "page" %}
          <li><a class="{% if page.url == node.url %}active{% endif %}" href="{{ node.url }}">{{ node.title }}</a></li>
        {% endif %}
      {% endfor %}

      {% for post in site.posts %}
        <li><a class="{% if page.url == post.url %}active{% endif %}" href="{{ post.url }}">{{ post.title }}</a></li>
      {% endfor %}
    </ul>
  </div>
</nav>
